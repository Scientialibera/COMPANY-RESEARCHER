[azure]
subscription_id = ""
location = "eastus"
resource_group_name = ""

[naming]
prefix = "companyresearcherv5"
storage_account_name = ""
function_app_name = ""
app_service_plan_name = ""
openai_account_name = ""

[storage]
source_container = "source-companies"
sink_container = "research-output"
additional_container = "additional-company-info"
prompts_container = "prompts"
function_definitions_container = "function-definitions"

[openai]
deployment_name = "gpt-5-mini"
model_name = "gpt-5-mini"
model_version = "2025-08-07"
sku_name = "S0"
deployment_sku_name = "GlobalStandard"
capacity = 500

[function_app]
runtime = "python"
runtime_version = "3.13"
os_type = "Linux"
plan_sku = "FlexConsumption"

[app_settings]
app_config_path = "config/app_config.toml"
openai_api_version = ""
output_push_to_sink = true
reasoning_model = true
reasoning_effort = "medium"

[deployment]
deploy_function_resources = true
deploy_openai_resources = true
